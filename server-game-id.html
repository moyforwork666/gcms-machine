const DB=(()=>{const KEY="gcms.db.v1";let cache=null;
  function load(){if(cache)return cache;try{cache=JSON.parse(localStorage.getItem(KEY))||{};}catch(e){cache={};}return cache;}
  function persist(){try{localStorage.setItem(KEY,JSON.stringify(cache));}catch(e){}}
  return {
    get(k,seed){const a=load();if(!(k in a)){a[k]=seed;persist();}return a[k];},
    set(k,v){const a=load();a[k]=v;persist();},
    all(){return load();},
    replaceAll(obj){cache=obj||{};persist();}
  };
})();
const pick = (o,keys) => { const r={}; keys.forEach(k=>r[k]=o[k]); return r; };

  return <span aria-hidden="true" style={{display:"inline-block",width:size,height:size,background:color||"currentColor",

              {batch&&<span title="勾選才會更新此欄位" style={{marginTop:f.type==="checkgroup"||f.type==="chips"?2:25}}><Check on={on} onClick={()=>setFieldOn({...fieldOn,[f.key]:!on})}/></span>}
              <div style={{flex:1,minWidth:0}}><FieldCtl f={f} val={draft[f.key]} ro={ro} onChange={v=>setD({...draft,[f.key]:v})} err={errors&&errors[f.key]}/></div>
            </div>;
          })}
        </div></div>;})}
    </div></div>;
}

function RecordEditor({columns,initial,onRowsChange,formGroups,sectioned,makeBlank,labelKey,searchKeys,filterDefs,canAdd=true,canBatch=true,batchableKeys,uniqueKey,uniqueLabel,addLabel="新增",toast,leftTitle="清單",page,tabs,tab,onTab,io=false,header,detailBtn,editBtns,extraActions,applyReset,store,batchExclude,autoId,exportExclude,onAfterCreate,midAction}){
  const initialRows=useMemo(()=>{let r=store?DB.get(store,initial):initial;
    if(autoId){const clean=r.filter(x=>{const v=x[autoId];return !(v==null||String(v).trim()===""||String(v)==="(自動)");});if(clean.length!==r.length){if(store)DB.set(store,clean);r=clean;}}
    return r;},[]);
  const [rows,setRows]=useState(initialRows);
  const setRowsP=(n)=>{setRows(n);if(store)DB.set(store,n);onRowsChange&&onRowsChange(n);};
  const fileRef=React.useRef(null);
  const filterKeys=(filterDefs||[]).map(f=>f.key);
  const effSearchKeys=(searchKeys||[]).filter(k=>!filterKeys.includes(k));
  const searchLabels=effSearchKeys.map(k=>{const c=(columns||[]).find(x=>x.key===k);if(c)return c.label;let f;(formGroups||[]).forEach(g=>(g.fields||[]).forEach(x=>{if(x.key===k)f=x.label;}));return (f||k).replace(/\s*\*\s*$/,"");});
  const searchPh=searchLabels.length?("搜尋 "+searchLabels.join(" / ")):"即時篩選";
  const [mode,setMode]=useState("single");
  const [q,setQ]=useState("");
  const [fvals,setFvals]=useState(()=>{const o={};(filterDefs||[]).forEach(f=>o[f.key]="全部");return o;});
  const [selected,setSelected]=useState(initialRows[0]?initialRows[0]._id:null);
  const [draft,setDraft]=useState(initialRows[0]?{...initialRows[0]}:null);
  const [view,setView]=useState(true);
  const [isNew,setIsNew]=useState(false);
  const [checks,setChecks]=useState({});
  const [bDraft,setBDraft]=useState(makeBlank?makeBlank():{});
  const [fieldOn,setFieldOn]=useState({});
  const [apply,setApply]=useState(false);
  const allKeys=formGroups.flatMap(g=>g.fields.map(f=>f.key));
  const batchable=(batchableKeys||allKeys).filter(k=>!(batchExclude||[]).includes(k));

  const filtered=useMemo(()=>rows.filter(r=>{
    const okQ=!q||effSearchKeys.some(k=>String(r[k]||"").toLowerCase().includes(q.toLowerCase()));
    const okF=(filterDefs||[]).every(f=>fvals[f.key]==="全部"||String(r[f.key])===fvals[f.key]);
    return okQ&&okF;}),[rows,q,fvals]);

  const [errors,setErrors]=useState({});
  const [applyOp,setApplyOp]=useState(null);const [applyConfirm,setApplyConfirm]=useState(null);
  const reqFields=formGroups.flatMap(g=>g.fields).filter(f=>f.required||/\*\s*$/.test(f.label||""));
  const isBlank=v=>v==null||(typeof v==="string"&&v.trim()==="")||(Array.isArray(v)&&v.length===0);
  function validate(d){const e={};
    reqFields.forEach(f=>{if(!f.readOnly&&!(f.lockEdit&&!isNew)&&!(f.enableKey&&!d[f.enableKey])&&!(f.gateKey&&gateOff(d[f.gateKey]))&&isBlank(d[f.key]))e[f.key]="必填";});
    if(uniqueKey&&uniqueKey!==autoId){if(isBlank(d[uniqueKey]))e[uniqueKey]=(uniqueLabel||uniqueKey)+" 為必填";
      else if(rows.some(r=>r._id!==d._id&&String(r[uniqueKey])===String(d[uniqueKey])))e[uniqueKey]=(uniqueLabel||uniqueKey)+" 已存在";}
    return e;}
  const nextAutoId=()=>String(Math.max(0,...rows.map(r=>parseInt(r[autoId])||0))+1);
  function selectRow(id){const r=rows.find(x=>x._id===id);setSelected(id);setDraft({...r});setView(true);setIsNew(false);setErrors({});setApplyOp(null);setApplyConfirm(null);}
  function startNew(){setDraft(makeBlank());setSelected(null);setView(false);setIsNew(true);setErrors({});setApplyOp(null);setApplyConfirm(null);}
  const editSet=d=>{setDraft(d);if(Object.keys(errors).length)setErrors({});};
  const ioName=(store||labelKey||"data");
  /* 單筆匯出：把目前檢視／編輯中的這一筆存成 JSON */
  function exportOne(rec){if(!rec)return;const nm=ioName+"-"+String(rec[uniqueKey]||rec._id);const out={};Object.keys(rec).forEach(k=>{if(!(exportExclude||[]).includes(k))out[k]=rec[k];});const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=nm+".json";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast("已匯出此筆");}
  /* 單筆匯入：讀入一筆 JSON，帶入目前表單供確認後儲存 */
  function importOne(file){const rd=new FileReader();rd.onload=()=>{let rec;try{rec=JSON.parse(rd.result);}catch(e){toast("⚠ JSON 解析失敗");return;}if(Array.isArray(rec))rec=rec[0];if(!rec||typeof rec!=="object"){toast("⚠ 檔案需為單筆物件");return;}
    setDraft(d=>Object.assign({},d,rec,{_id:(d&&d._id)||uid()}));setErrors({});toast("已帶入匯入資料，請確認後儲存");};
    rd.readAsText(file);}
  function save(){
    const e=validate(draft);
    if(Object.keys(e).length){setErrors(e);return;}
    setErrors({});
    const suffix=applyOp?("，並對機台執行"+applyOp):"";
    if(isNew){const rec=autoId?Object.assign({},draft,{[autoId]:nextAutoId()}):{...draft};setRowsP([rec,...rows]);setSelected(rec._id);setDraft(rec);setIsNew(false);setView(true);toast("新增完成"+suffix);if(onAfterCreate)onAfterCreate(rec);}
    else{setRowsP(rows.map(r=>r._id===draft._id?{...draft}:r));setView(true);toast("編輯完成"+suffix);}
    setApplyOp(null);
  }
  const nChecked=Object.values(checks).filter(Boolean).length;
  const changedFields=allKeys.filter(k=>fieldOn[k]);
  function checkAll(on){const c={};filtered.forEach(r=>c[r._id]=on);setChecks(c);}
  function doApply(n){setRowsP(rows.map(r=>checks[r._id]?{...r,...pick(bDraft,changedFields)}:r));setApply(false);setChecks({});setFieldOn({});toast(`已套用 ${n} 筆`);}
  function toBatch(){setMode("batch");setBDraft(makeBlank());setFieldOn({});}

  const changedLabels=formGroups.flatMap(g=>g.fields).filter(f=>fieldOn[f.key]).map(f=>f.label);

  function cancelEdit(){setErrors({});setApplyOp(null);setApplyConfirm(null);if(mode==="batch"){setMode("single");setChecks({});setFieldOn({});setBDraft(makeBlank());setView(true);}else if(isNew){const f=rows[0];setDraft(f?{...f}:null);setSelected(f?f._id:null);setIsNew(false);setView(true);}else{selectRow(selected);setView(true);}}
  const viewCol={key:"__view",label:"",w:60,align:"center",actions:r=><Tooltip label="查看"><span onClick={()=>selectRow(r._id)} style={{cursor:"pointer",width:30,height:30,borderRadius:6,display:"inline-flex",alignItems:"center",justifyContent:"center",color:"var(--brand-primary)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--surface-subtle)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><Icon name="file" size={18} color="var(--brand-primary)"/></span></Tooltip>};
  const actions=<>{extraActions}{mode==="batch"
    ?<Button variant="cancel" icon="close" onClick={cancelEdit}>取消批次</Button>
    :<>{canAdd&&<Button variant="confirm" icon="plus" onClick={()=>{setMode("single");startNew();}}>{addLabel}</Button>}{midAction}{canBatch&&<Button variant="primary" icon="files" onClick={toBatch}>批次編輯</Button>}</>}</>;
  const body=<div style={{flex:1,minHeight:0,display:"flex",gap:12}}>
      <Panel style={{flex:1}}>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,padding:"10px 12px",borderBottom:"1px solid var(--border-light)",flex:"none",flexWrap:"wrap"}}>
          {(filterDefs||[]).map(f=><Field key={f.key} label={f.label} type="select" value={fvals[f.key]} options={f.options} w={140} onChange={v=>setFvals({...fvals,[f.key]:v})}/>)}
          <div style={{flex:1,minWidth:160}}><div style={{font:"500 11px Roboto",color:"var(--text-label)",marginBottom:5}}>搜尋</div>
            <div style={{height:36,display:"flex",alignItems:"center",gap:8,padding:"0 11px",border:"1px solid var(--text-input-rest-border)",borderRadius:"var(--dimension-radius-1)",background:"var(--surface-base)"}}>
              <Icon name="search" size={14} color="var(--text-subtle)"/><input value={q} onChange={e=>setQ(e.target.value)} placeholder={searchPh} title={searchPh} style={{border:0,outline:0,background:"transparent",font:"13px Roboto",color:"var(--text-primary)",flex:1}}/>{q&&<span onClick={()=>setQ("")} style={{cursor:"pointer",color:"var(--text-muted)"}}>✕</span>}</div></div>
        </div>
        {mode==="batch"&&<div style={{margin:"10px 12px 0",padding:"0 12px",height:36,display:"flex",alignItems:"center",background:"var(--alpha-yellow50-a20)",borderRadius:6,font:"600 12.5px Roboto",color:"var(--text-primary)"}}>已選 {nChecked} 筆 — 在右側勾選欄位後套用</div>}
        <DataTable cols={mode==="batch"?columns:[...columns,viewCol]} rows={filtered} single={mode==="single"} selected={selected} onSelect={selectRow} selectable={mode==="batch"} checks={checks} onCheck={id=>setChecks({...checks,[id]:!checks[id]})} onCheckAll={checkAll} editing={mode==="batch"||!view}/>
        <div style={{flex:"none",borderTop:"1px solid var(--border-light)",padding:"8px 14px",font:"12px Roboto",color:"var(--text-subtle)"}}>顯示 {filtered.length} / {rows.length} 筆</div>
      </Panel>
      <Panel title={mode==="batch"?`批次編輯 · 已選 ${nChecked} 筆`:(isNew?addLabel:(draft?`${view?"檢視":"編輯"}：${draft[labelKey]}`:"詳細"))} style={{width:460,flex:"none"}}
        right={null}>
        {mode==="batch"
          ? <>{nChecked===0
              ? <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-subtle)",font:"13px Roboto",textAlign:"center",padding:20}}>請於左側勾選要批次更新的資料，<br/>再於此勾選並填入要變更的欄位</div>
              : <><div style={{padding:"10px 16px 0",font:"12px Roboto",color:"var(--text-subtle)"}}>勾選欄位前的方框，僅勾選者會更新；未勾選維持各筆原值。</div>
                  <EditForm groups={formGroups} sectioned={sectioned} draft={bDraft} setD={setBDraft} mode="batch" fieldOn={fieldOn} setFieldOn={setFieldOn} batchable={batchable}/>
                  <Footer><Button variant="cancel" onClick={()=>{setFieldOn({});setBDraft(makeBlank());setChecks({});setMode("single");setView(true);}}>取消</Button>
                    <Button variant="confirm" icon="save" state={changedFields.length?"rest":"disabled"} onClick={()=>setApply(true)}>套用到選取（{nChecked}）</Button></Footer></>}
            </>
          : (!draft
              ? <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-subtle)",font:"13px Roboto"}}>請於左側選一筆{canAdd?`，或按「${addLabel}」`:""}</div>
              : <><EditForm groups={formGroups} sectioned={sectioned} draft={draft} setD={editSet} mode={view?"view":"edit"} isNew={isNew} errors={errors}/>
                  {view
                    ? <div style={{flex:"none",borderTop:"1px solid var(--border-light)",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}><div style={{display:"flex",gap:8}}>{detailBtn&&detailBtn(draft)}</div><div style={{display:"flex",gap:8}}>{io&&draft&&<Button variant="light-gray" icon="export" onClick={()=>exportOne(draft)}>匯出</Button>}<Button variant="primary" icon="edit" onClick={()=>{setMode("single");setView(false);}}>編輯</Button></div></div>
                    : <>{applyReset&&<div style={{flex:"none",borderTop:"1px solid var(--border-light)",padding:"12px 14px 14px"}}>
                        <div style={{font:"12px Roboto",color:"var(--text-label)",marginBottom:6}}>套用至（重啟／重置 二擇一）</div>
                        <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>{["重啟","重置"].map(op=><label key={op} onClick={()=>{if(applyOp===op)setApplyOp(null);else setApplyConfirm(op);}} style={{display:"flex",alignItems:"center",gap:8,font:"13px Roboto",color:"var(--text-body)",cursor:"pointer"}}><Check on={applyOp===op}/>套用至{op}</label>)}</div>
                      </div>}
                      <Footer>{editBtns&&!isNew&&<>{editBtns(draft)}<div style={{flex:1}}/></>}{io&&<Button variant="support" icon="import" onClick={()=>fileRef.current&&fileRef.current.click()}>匯入</Button>}<Button variant="cancel" onClick={()=>{setErrors({});setApplyOp(null);if(isNew){const f=rows[0];setDraft(f?{...f}:null);setSelected(f?f._id:null);setIsNew(false);}else selectRow(selected);setView(true);}}>取消</Button>
                        <Button variant="confirm" icon="save" onClick={save}>{isNew?"建立":"儲存"}</Button></Footer></>}</>)}
      </Panel>
    </div>;
  const applyM=<>{<ApplyModal open={apply} count={nChecked} fields={changedLabels} onClose={()=>setApply(false)} onApply={doApply}/>}<ReloadConfirm open={!!applyConfirm} action={applyConfirm||"重置"} onCancel={()=>setApplyConfirm(null)} onConfirm={()=>{setApplyOp(applyConfirm);setApplyConfirm(null);}}/>{io&&<input ref={fileRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={e=>{const f=e.target.files&&e.target.files[0];if(f)importOne(f);e.target.value="";}}/>}</>;
  if(page||header) return <div style={{flex:1,minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column",background:"var(--surface-subtle)"}}>

function themeRequiredErrors(groups,draft){

            <div style={{display:"flex",gap:10}}>{promoView
              ? <><Button variant="cancel" onClick={()=>setPromoOpen(false)}>關閉</Button><Button variant="primary" icon="edit" onClick={()=>{setPromoSnap(pf);setPromoView(false);}}>編輯</Button></>
              : <><Button variant="cancel" onClick={()=>{if(promoSnap)setPf(promoSnap);setPromoView(true);}}>取消</Button><Button variant="confirm" icon="save" onClick={()=>{setPromoOpen(false);setPromoView(true);toast("已儲存 Bingo Promotion 設定");}}>儲存設定</Button></>}</div></div>
        </div>
      </div>;
    })();
  if(cur) return <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",background:"var(--surface-subtle)",overflow:"hidden"}}>
    <div style={{flex:"none",minHeight:58,padding:"8px 24px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid var(--border-light)",background:"var(--header-base-bg)"}}>
      <Button variant="cancel" icon="arrow-l" style={{minWidth:0,padding:"0 12px"}} onClick={()=>setDetailId(null)}>Game Server</Button>
      <span style={{font:"800 19px Roboto",color:"var(--text-title-strong)"}}>{cur.desc}</span>
      <span style={{font:"600 14px Roboto",color:"var(--text-subtle)"}}>· Bingo Machine（Game Server {cur.gsid} · {cur.mtype}）</span></div>
    <div style={{flex:1,minHeight:0,display:"flex",gap:14,padding:"16px 20px"}}>
      <Panel title="新增 Bingo Machine" style={{width:340,flex:"none"}}>
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Add Machines（數量）" value={addN} onChange={setAddN} placeholder="例 14"/>
          <div style={{display:"flex",alignItems:"flex-end",gap:8}}><Field label="Machine Bank" type="select" value={bank} options={["3","4","5"]} onChange={setBank} w="100%"/><span style={{paddingBottom:9,color:"var(--text-muted)"}}>~</span><Field value={bank} readOnly w={64}/></div>
          <div style={{display:"flex",alignItems:"flex-end",gap:8}}><Field label="Machine Number（起）" value={mnStart} onChange={setMnStart} placeholder="例 412333" w="100%"/><span style={{paddingBottom:9,color:"var(--text-muted)"}}>~</span><Field value={mnEnd} readOnly w={90}/></div>
          <div style={{padding:"12px 14px",background:"var(--alpha-yellow50-a20)",borderRadius:8,font:"13px/1.6 Roboto",color:"var(--text-primary)"}}>將新增 {cnt} 台 Bingo Machine{ms?`：${ms}–${mnEnd}`:""} · Bank {bank}</div>
        </div>
        <Footer><Button variant="cancel" onClick={()=>{setAddN("");setMnStart("");}}>Cancel</Button><Button variant="confirm" icon="plus" onClick={buildMachines}>Update</Button></Footer>
      </Panel>
      <Panel title={`Bingo Machine（${cur.machines.length}）`} style={{flex:1}}>
        <DataTable cols={[{key:"idx",label:"Index",w:70,num:true},{key:"gid",label:"GroupId",w:100},{key:"mn",label:"Machine Number",w:170,num:true},{key:"loc",label:"Location",w:150}]} rows={cur.machines} empty="此 Game Server 尚無 Bingo Machine，請於左側新增。"/>
      </Panel>
    </div>
    {confirmDialog}{promoNode}
  </div>;
  return <>
    <RecordEditor page={pageName} toast={toast} store="bingoServers" autoId="gsid" sectioned extraActions={listActions} labelKey="desc" uniqueKey="gsid" uniqueLabel="Game Server Id" addLabel="新增 Game Server"
      detailBtn={r=><Button variant="primary" icon="files" style={{minWidth:0,padding:"0 12px"}} onClick={()=>setDetailId(r._id)}>Bingo Machine 詳細</Button>}
      columns={[{key:"gsid",label:"Game Server Id",w:140,num:true},{key:"desc",label:"Description",w:240},{key:"mtype",label:"Machine Type",w:160},{key:"machines",label:"Machines",w:110,num:true,cell:r=>r.machines.length}]}
      searchKeys={["gsid","desc","mtype"]}
      filterDefs={[{key:"mtype",label:"Machine Type",options:["全部","Multi Bingo","Single Bingo"]}]}
      initial={servers} onRowsChange={setServers}
      makeBlank={()=>({_id:uid(),gsid:"",desc:"",mtype:"Multi Bingo",machines:[]})}
      formGroups={[{section:"Game Server Information",fields:[{key:"desc",label:"Description",required:true},{key:"mtype",label:"Machine Type",type:"select",options:["Multi Bingo","Single Bingo"],required:true}]}]}/>
    {confirmDialog}{promoNode}
  </>;
}

/* ---- Non-SAS (同機台維護：清單 + 右側編輯卡片) ---- */
function NonSasPage({toast,pageName}){
  const [regions,setRegions]=useState(()=>DB.get("nonsasRegions",[{_id:1,id:"1",nm:"DEMO"},{_id:2,id:"2",nm:"A8"},{_id:3,id:"6",nm:"(未命名)"}]));
  const [rsOpen,setRsOpen]=useState(false);
  const ridOpts=["N/A"].concat(regions.map(r=>r.nm));
  const columns=[{key:"mn",label:"MNum",w:150},{key:"loc",label:"Location",w:150},{key:"rid",label:"Region ID",w:150,chip:v=>v==="N/A"?"neutral":"primary"},{key:"mid",label:"Machine ID",w:170}];
  const formGroups=[{tab:"Region Mapping",fields:[
    {key:"mn",label:"MNum",lockEdit:true},
    {key:"loc",label:"Location",lockEdit:true},
    {key:"rid",label:"Region ID",type:"select",options:ridOpts,required:true},
    {key:"mid",label:"Machine ID"}]}];
  const extra=<Button variant="outline" onClick={()=>setRsOpen(true)}>Region Setting</Button>;
  return <>
    <RecordEditor page={pageName} toast={toast} store="nonsasMachines" canAdd={false} batchExclude={["mn","loc","mid"]} labelKey="mn" uniqueKey="mn" uniqueLabel="MNum"
      columns={columns}
      searchKeys={["mn","loc"]}
      filterDefs={[{key:"rid",label:"Region 篩選",options:["全部","N/A"].concat(regions.map(r=>r.nm))}]}
      initial={[
        {_id:1,mn:"314843",loc:"DM0212",rid:"DEMO",mid:"DM0212"},{_id:2,mn:"314829",loc:"DM0213",rid:"DEMO",mid:"DM0213"},
        {_id:3,mn:"314846",loc:"DM0215",rid:"DEMO",mid:"DM0215"},{_id:4,mn:"314537",loc:"DM0301",rid:"N/A",mid:"N/A"},
        {_id:5,mn:"314538",loc:"DM0302",rid:"N/A",mid:"N/A"},{_id:6,mn:"314539",loc:"DM0303",rid:"N/A",mid:"N/A"}]}
      makeBlank={()=>({_id:uid(),mn:"",loc:"",rid:"N/A",mid:"N/A"})}
      formGroups={formGroups} batchableKeys={["rid","mid"]}
      extraActions={extra}/>
    {rsOpen&&<div style={{position:"absolute",inset:0,background:"rgba(20,30,45,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:58}}>
      <div style={{width:1080,height:720,maxWidth:"94vw",maxHeight:"92vh",background:"var(--surface-base)",borderRadius:"var(--radius-lg)",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 24px 70px rgba(0,0,0,.4)"}}>
        <div style={{background:"var(--dialog-header-bg)",height:52,flex:"none",padding:"0 20px",display:"flex",alignItems:"center"}}><span style={{font:"700 16px Roboto",color:"#fff",flex:1}}>Region Setting</span><span onClick={()=>setRsOpen(false)} title="關閉" style={{cursor:"pointer",color:"#fff",opacity:.85}}><Icon name="close" size={18} color="#fff"/></span></div>
        <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",padding:"14px 16px",background:"var(--surface-subtle)"}}>
          <RecordEditor toast={toast} store="nonsasRegions" autoId="id" leftTitle="Region 清單" canBatch={false} addLabel="新增 Region" labelKey="nm" uniqueKey="id" uniqueLabel="Region ID"
            columns={[{key:"id",label:"ID",w:90,num:true},{key:"nm",label:"名稱",w:260}]}
            searchKeys={["id","nm"]}
            initial={regions}
            onRowsChange={setRegions}
            makeBlank={()=>({_id:uid(),id:"",nm:""})}
            formGroups={[{tab:"資料",fields:[{key:"nm",label:"Region 名稱 *",full:true}]}]}/>
        </div>
      </div></div>}
  </>;
}
/* ---- wizards ---- */
function Stepper({steps,active}){
  return <div style={{display:"flex",alignItems:"flex-start",padding:"8px 8px 18px"}}>{steps.map((s,i)=>{const done=i<active,cur=i===active;
    return <div key={s.label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
      {i>0&&<div style={{position:"absolute",left:"-50%",top:15,width:"100%",height:2,background:i<=active?"var(--brand-primary)":"var(--border-default)"}}/>}
      <div style={{width:32,height:32,borderRadius:"50%",zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",background:done||cur?"var(--brand-primary)":"var(--surface-base)",border:cur?"4px solid var(--alpha-slate60-a31,#cbd8e8)":"1px solid var(--border-default)",color:done||cur?"#fff":"var(--text-muted)",font:"700 13px Roboto"}}>{done?"✓":i+1}</div>
      <div style={{marginTop:8,font:`${cur?700:500} 12px Roboto`,color:cur?"var(--brand-primary)":(done?"var(--text-primary)":"var(--text-muted)"),textAlign:"center",display:"flex",alignItems:"center",gap:4}}>{s.label}{s.opt&&<span style={{font:"10px Roboto",color:"var(--text-muted)"}}>(條件)</span>}</div></div>;})}</div>;
}
const NG_GROUP_FIELDS=[{key:"gid",label:"Group Id *"},{key:"desc",label:"Description"},{key:"rate",label:"Rate (%)"},{key:"gt",label:"Game Type",type:"select",options:["Baccarat","Slot","Sic-Bo"]},{key:"memo",label:"Group Memo",type:"textarea",full:true}];
const NG_THEME_FIELDS=[{key:"nm",label:"主題名稱 Name *"},{key:"gtn",label:"類型 Type",type:"select",options:["Baccarat","Slot","Big Wheel"]}];
const NG_TYPE_FIELDS=[{key:"ty",label:"Game Type *"},{key:"desc",label:"Game Description"},{key:"grp",label:"Game Type Group",type:"select",options:["Queen BA-1","Queen BA-2","Queen RL-1","Queen SB-1","Queen DT-1"]},{key:"mf",label:"Manufacturer",type:"select",options:["Napoleon","Aristocrat","Scientific","Konami","IGT"]},{key:"denom",label:"Denom",type:"select",options:["0.01","1.00"]},{key:"cat",label:"Category",type:"select",options:["Baccarat","Roulette","Sic Bo","Dragon Tiger","Fan Tan","Pai Gow"]}];
function NewGameWizard({toast,go,pageName}){
  const steps=[{key:"group",label:"遊戲類型群組",page:"遊戲類型群組",opt:true},{key:"theme",label:"遊戲主題",page:"遊戲主題",opt:true},{key:"type",label:"機台類型",page:"機台類型",opt:true},{key:"machine",label:"機台設定",page:"機台維護",opt:true},{key:"nonsas",label:"Non-SAS",page:"Non-SAS 設定",opt:true},{key:"bingo",label:"賓果",page:"賓果維護",opt:true},{label:"檢視套用"}];
  const PAGES={"遊戲類型群組":GroupPage,"遊戲主題":ThemePage,"機台類型":MachineTypePage,"機台維護":MachinePage,"Non-SAS 設定":NonSasPage,"賓果維護":BingoPage};
  const [active,setActive]=useState(0);const [skipped,setSkipped]=useState({});
  const [applyOp,setApplyOp]=useState(null);const [confirmOp,setConfirmOp]=useState(null);
  function finish(op){toast(op?"已套用所有未略過的步驟，並對機台執行"+op:"已套用所有未略過的步驟");setConfirmOp(null);setTimeout(()=>go&&go("機台維護"),700);}
  const isSkip=k=>!!skipped[k];const setSkip=(k,v)=>setSkipped(Object.assign({},skipped,{[k]:v}));
  const next=()=>setActive(a=>Math.min(a+1,steps.length-1));const prev=()=>setActive(a=>Math.max(a-1,0));
  const cur=steps[active];const last=steps.length-1;
  let body;
  if(!cur.key){
    body=<div style={{flex:1,minHeight:0,overflow:"auto",padding:"16px 24px",display:"flex",flexDirection:"column",gap:10}}>
      <div style={{font:"700 15px Roboto",color:"var(--text-title-strong)",marginBottom:4}}>檢視即將套用的步驟</div>
      {steps.filter(s=>s.key).map(s=>{const sk=isSkip(s.key);return <div key={s.key} style={{border:"1px solid var(--border-light)",borderRadius:8,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setActive(steps.indexOf(s))}><div><div style={{font:"600 13px Roboto",color:"var(--text-primary)"}}>{s.label}</div><div style={{font:"12px Roboto",color:"var(--text-subtle)",marginTop:3}}>{s.page} 功能頁</div></div><Chip tone={sk?"neutral":"success"}>{sk?"略過（未變更）":"已包含"}</Chip></div>;})}
      <div style={{marginTop:6,font:"12px Roboto",color:"var(--text-label)"}}>套用後對機台執行（二擇一）</div>
      {["重啟","重置"].map(op=><label key={op} onClick={()=>{if(applyOp===op)setApplyOp(null);else setConfirmOp(op);}} style={{display:"flex",alignItems:"center",gap:8,marginTop:4,font:"13px Roboto",color:"var(--text-body)",cursor:"pointer"}}><Check on={applyOp===op}/>套用後對機台執行{op}</label>)}
      {applyOp&&<div style={{font:"12px/1.6 Roboto",color:"var(--text-subtle)",marginLeft:26}}>已確認：套用後將對機台執行{applyOp}，重新連線所選機台。</div>}</div>;
  } else if(cur.opt&&isSkip(cur.key)){
    body=<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",color:"var(--text-subtle)"}}><Icon name="info" size={30} color="var(--text-muted)"/><div style={{margin:"12px 0",font:"14px/1.7 Roboto"}}>「{cur.label}」此步驟已略過，不會選擇或變更任何值。</div><Button variant="light-gray" icon="edit" onClick={()=>setSkip(cur.key,false)}>改為填寫此步</Button></div></div>;
  } else {
    const Page=PAGES[cur.page];
    body=<div key={cur.key} style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>{Page?<Page toast={toast} pageName={cur.page}/>:null}</div>;
  }
  return <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",background:"var(--surface-subtle)",overflow:"hidden"}}>
    <div style={{flex:"none",background:"var(--header-base-bg)",borderBottom:"1px solid var(--border-light)",padding:"8px 16px 0"}}><Stepper steps={steps} active={active}/></div>
    {body}
    <div style={{flex:"none",borderTop:"1px solid var(--border-light)",background:"var(--header-base-bg)",padding:"10px 20px",display:"flex",justifyContent:"flex-end",gap:10}}>
      <Button variant="cancel" state={active>0?"rest":"disabled"} onClick={prev}>上一步</Button>
      {cur.opt&&!isSkip(cur.key)&&<Button variant="light-gray" onClick={()=>{setSkip(cur.key,true);next();}}>略過此步</Button>}
      {active<last?<Button variant="primary" onClick={next}>下一步 ›</Button>:<Button variant="confirm" icon="check" onClick={()=>finish(applyOp)}>確認套用</Button>}
    </div>
    <ReloadConfirm open={!!confirmOp} action={confirmOp||"重置"} onCancel={()=>setConfirmOp(null)} onConfirm={()=>{setApplyOp(confirmOp);setConfirmOp(null);}}/>
  </div>;
}

/* ============================ App ============================ */
function App(){
  const [active,setActive]=useState("Server Game ID");const [expanded,setExpanded]=useState(false);const [toastMsg,setToastMsg]=useState("");
  const toast=m=>setToastMsg(m);const FILES={"機台快速建置流程":"quick-setup.html","機台維護":"machine.html","機台類型":"machine-type.html","遊戲類型群組":"game-group.html","遊戲主題":"game-theme.html","製造商":"manufacturer.html","百家樂設定":"baccarat.html","賓果維護":"bingo.html","Non-SAS 設定":"non-sas.html","Server Game ID":"server-game-id.html"};const go=p=>{const f=FILES[p];if(f)window.location.href=f;};
  const pages={"機台快速建置流程":<NewGameWizard toast={toast} go={go}/>,
    "機台維護":<MachinePage toast={toast}/>,"機台類型":<MachineTypePage toast={toast}/>,"遊戲類型群組":<GroupPage toast={toast}/>,"遊戲主題":<ThemePage toast={toast}/>,"製造商":<ManufacturerPage toast={toast}/>,"百家樂設定":<BaccaratPage toast={toast}/>,"賓果維護":<BingoPage toast={toast}/>,"Non-SAS 設定":<NonSasPage toast={toast}/>,"Server Game ID":<ServerGameIdPage toast={toast}/>};
  return <div className="frame">
    <Sidebar active={active} onSelect={go} expanded={expanded} onToggle={()=>setExpanded(v=>!v)}/>
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,minHeight:0,overflow:"hidden",position:"relative",background:"var(--surface-subtle)"}}><Header page={active}/>{React.cloneElement(pages[active],{key:active,pageName:active})}<Toast msg={toastMsg} onDone={()=>setToastMsg("")}/></div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
